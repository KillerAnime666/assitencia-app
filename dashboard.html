<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Attendance Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 p-4 md:p-6 transition-colors duration-300">
    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8">
            <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 dark:text-white">📊 Estadísticas</h1>
            <a href="index.html" class="w-full sm:w-auto flex items-center justify-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl font-bold text-sm border dark:border-slate-700 hover:shadow-md transition-all group">
                <span class="transform group-hover:-translate-x-1 transition-transform">←</span>
                <span>Volver al Registro</span>
            </a>
        </header>

        <div class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border dark:border-slate-700 mb-6">
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Filtrar por Estudiante</label>
            <select id="studentFilter" class="w-full md:w-1/3 p-3 border dark:border-slate-600 rounded-xl bg-transparent text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-blue-500 text-sm"></select>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border dark:border-slate-700">
                <div class="relative h-[300px] flex items-center justify-center">
                    <canvas id="attendanceChart"></canvas>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-1 gap-4">
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border-l-8 border-green-500 shadow-sm border dark:border-slate-700">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Presentes</p>
                    <div class="flex justify-between items-end">
                        <h3 id="countPresent" class="text-2xl font-black">0</h3>
                        <span id="percentPresent" class="text-xs font-bold text-green-600 bg-green-50 dark:bg-green-900/20 px-2 py-0.5 rounded">0%</span>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border-l-8 border-red-500 shadow-sm border dark:border-slate-700">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Ausentes</p>
                    <div class="flex justify-between items-end">
                        <h3 id="countAbsent" class="text-2xl font-black">0</h3>
                        <span id="percentAbsent" class="text-xs font-bold text-red-600 bg-red-50 dark:bg-red-900/20 px-2 py-0.5 rounded">0%</span>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border-l-8 border-[#940bf5] shadow-sm border dark:border-slate-700">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Licencia</p>
                    <div class="flex justify-between items-end">
                        <h3 id="countPermission" class="text-2xl font-black">0</h3>
                        <span id="percentPermission" class="text-xs font-bold text-purple-600 bg-purple-50 dark:bg-purple-900/20 px-2 py-0.5 rounded">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
