<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Detallado | Attendance Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 p-6">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800">📊 Análisis de Asistencia</h1>
            <a href="index.html" class="text-blue-600 hover:underline font-medium">← Volver al Registro</a>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border mb-8">
            <label class="block text-sm font-bold text-slate-500 uppercase mb-2">Filtrar por Estudiante</label>
            <select id="studentFilter" class="w-full md:w-1/3 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <option value="all">📈 Vista Global (Todo el curso)</option>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
            
            <div class="bg-white p-8 rounded-3xl shadow-sm border">
                <canvas id="attendanceChart"></canvas>
            </div>

            <div class="space-y-4">
                <h2 id="statsTitle" class="text-xl font-bold text-slate-700 mb-4">Estadísticas Generales</h2>
                
                <div class="bg-white p-4 rounded-2xl border-l-8 border-green-500 shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-sm text-slate-500 font-bold uppercase">Presentes</p>
                        <h3 id="countPresent" class="text-2xl font-black text-slate-800">0</h3>
                    </div>
                    <div class="text-right">
                        <span id="percentPresent" class="text-lg font-bold text-green-600 bg-green-50 px-3 py-1 rounded-lg">0%</span>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-2xl border-l-8 border-red-500 shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-sm text-slate-500 font-bold uppercase">Ausentes</p>
                        <h3 id="countAbsent" class="text-2xl font-black text-slate-800">0</h3>
                    </div>
                    <div class="text-right">
                        <span id="percentAbsent" class="text-lg font-bold text-red-600 bg-red-50 px-3 py-1 rounded-lg">0%</span>
                    </div>
                </div>  

                <div class="bg-white p-4 rounded-2xl border-l-8 border-[#940bf5] shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-sm text-slate-500 font-bold uppercase">Con Permiso</p>
                        <h3 id="countPermission" class="text-2xl font-black text-slate-800">0</h3>
                    </div>
                    <div class="text-right">
                        <span id="percentPermission" class="text-lg font-bold text-[#940bf5] bg-purple-50 px-3 py-1 rounded-lg">0%</span>
                    </div>
                </div>

                <p class="text-xs text-slate-400 text-center mt-4 italic">Total de registros evaluados: <span id="totalRecords">0</span></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
