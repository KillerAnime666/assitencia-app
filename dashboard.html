<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Attendance Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 p-6 transition-colors duration-300">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800 dark:text-white">📊 Estadísticas</h1>
            <a href="index.html" class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl font-bold text-sm border dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 hover:shadow-md transition-all group">
                <span class="transform group-hover:-translate-x-1 transition-transform">←</span>
                <span>Volver al Registro</span>
            </a>
        </div>

        <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border dark:border-slate-700 mb-8">
            <label class="block text-sm font-bold text-slate-500 dark:text-slate-400 uppercase mb-2 text-xs">Filtrar Estudiante</label>
            <select id="studentFilter" class="w-full md:w-1/3 p-3 border dark:border-slate-600 rounded-xl bg-transparent text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-blue-500"></select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
            <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm border dark:border-slate-700">
                <canvas id="attendanceChart"></canvas>
            </div>

            <div class="space-y-4">
                <h2 id="statsTitle" class="text-xl font-bold text-slate-700 dark:text-slate-200 mb-4">Curso General</h2>
                
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border-l-8 border-green-500 shadow-sm flex justify-between items-center border dark:border-slate-700">
                    <div><p class="text-[10px] text-slate-400 font-bold uppercase">Presentes</p><h3 id="countPresent" class="text-2xl font-black dark:text-white">0</h3></div>
                    <span id="percentPresent" class="text-lg font-bold text-green-600 bg-green-50 dark:bg-green-900/20 px-3 py-1 rounded-lg">0%</span>
                </div>

                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border-l-8 border-red-500 shadow-sm flex justify-between items-center border dark:border-slate-700">
                    <div><p class="text-[10px] text-slate-400 font-bold uppercase">Ausentes</p><h3 id="countAbsent" class="text-2xl font-black dark:text-white">0</h3></div>
                    <span id="percentAbsent" class="text-lg font-bold text-red-600 bg-red-50 dark:bg-red-900/20 px-3 py-1 rounded-lg">0%</span>
                </div>

                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border-l-8 border-[#940bf5] shadow-sm flex justify-between items-center border dark:border-slate-700">
                    <div><p class="text-[10px] text-slate-400 font-bold uppercase">Con Permiso</p><h3 id="countPermission" class="text-2xl font-black dark:text-white">0</h3></div>
                    <span id="percentPermission" class="text-lg font-bold text-[#940bf5] bg-purple-50 dark:bg-purple-900/20 px-3 py-1 rounded-lg">0%</span>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
