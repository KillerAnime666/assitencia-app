<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="loginSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h2 class="text-3xl font-extrabold text-center text-blue-600 mb-6">Attendance Pro</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Correo electrónico" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
                <input type="password" id="password" placeholder="Contraseña" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
                <button id="loginBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition duration-300">Entrar al Sistema</button>
            </div>
        </div>
    </div>

    <main id="mainContent" class="hidden min-h-screen">
        <nav class="bg-white shadow-sm border-b p-4 flex justify-between items-center px-8">
            <h1 class="text-xl font-bold text-gray-700">📋 Panel de Control</h1>
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-blue-600 font-semibold hover:underline">Estadísticas 📊</a>
                <button id="logoutBtn" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm hover:bg-red-100 transition">Salir</button>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="font-bold text-gray-500 uppercase text-xs mb-4">Gestión de Estudiantes</h3>
                    <div class="flex gap-2">
                        <input type="text" id="newStudentName" placeholder="Nombre completo..." class="flex-1 p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                        <button id="addStudentBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Añadir</button>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="font-bold text-gray-500 uppercase text-xs mb-4">Importar / Exportar</h3>
                    <div class="flex flex-wrap gap-2">
                        <input type="file" id="csvFile" accept=".csv" class="text-xs">
                        <button id="uploadCsvBtn" class="bg-gray-100 px-4 py-2 rounded-lg text-xs font-bold hover:bg-gray-200">Subir CSV</button>
                        <button id="exportExcelBtn" class="bg-green-100 text-green-700 px-4 py-2 rounded-lg text-xs font-bold hover:bg-green-200">Descargar Excel</button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <div class="p-4 bg-gray-50 border-b flex flex-wrap justify-between items-center gap-4">
                    <div class="flex gap-4">
                        <input type="date" id="attendanceDate" class="p-2 border rounded-lg text-sm">
                        <input type="text" id="searchStudent" placeholder="Buscar alumno..." class="p-2 border rounded-lg text-sm w-64">
                    </div>
                    <button id="markAllPresent" class="text-xs bg-blue-100 text-blue-700 px-4 py-2 rounded-full font-bold hover:bg-blue-200 transition">Marcar Todos Presentes</button>
                </div>

                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-gray-50 text-gray-400 text-xs uppercase">
                            <th class="p-4 border-b">Nombre del Estudiante</th>
                            <th class="p-4 border-b text-center">Presente</th>
                            <th class="p-4 border-b text-center">Ausente</th>
                            <th class="p-4 border-b text-center">Permiso</th>
                            <th class="p-4 border-b text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="studentsBody" class="divide-y">
                        </tbody>
                </table>

                <div class="p-6 bg-gray-50 text-right">
                    <button id="saveAttendanceBtn" class="bg-blue-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 transform hover:scale-105 transition">Guardar Asistencia de Hoy</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
